<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Package Details</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .detail-container { max-width:700px; margin:40px auto; background:white; border-radius:12px; box-shadow:0 0 20px rgba(0,0,0,0.1); overflow:hidden; }
        .detail-container img { width:100%; height:320px; object-fit:cover; }
        .detail-info { padding:30px; }
        .detail-info h2 { font-size:28px; margin-bottom:10px; color:#3D2612; }
        .detail-price { font-size:22px; color:#ff4d6d; font-weight:bold; margin-bottom:8px; }
        .detail-guests { font-size:16px; color:#80B3AD; font-weight:bold; margin-bottom:15px; }
        .detail-info p { font-size:16px; line-height:1.7; color:#555; }
        .back-btn { display:inline-block; margin:20px 30px; padding:10px 20px; background:#80B3AD; color:white; border-radius:5px; text-decoration:none; font-weight:bold; }
        .back-btn:hover { background:#3D2612; }
        .loading { text-align:center; padding:60px; font-size:18px; color:#888; }
    </style>
</head>
<body>

<header>
    <h1>💍 Wedding Marketplace</h1>
    <nav>
        <a href="index.html">Home</a>
        <a href="products.html">Products</a>
        <a href="services.html">Services</a>
        <a href="dashboard.html">Dashboard</a>
        <a href="contact.html">Contact Us</a>
    </nav>
</header>

<h2 class="section-title">Package Details</h2>

<div id="content" class="loading">Loading package details...</div>

<div style="text-align:center; margin-bottom:30px;">
    <a href="dashboard.html" class="back-btn">← Back to Packages</a>
</div>

<script>
    function getParam(name) {
        var regex = new RegExp('[?&]' + name + '=([^&#]*)');
        var match = regex.exec(window.location.href);
        return match ? match[1] : null;
    }
    var id = getParam('id');
    if (!id) {
        document.getElementById("content").innerHTML = "<p style='text-align:center;padding:40px'>No package selected.</p>";
    } else {
        fetch("/api/packages/" + id)
            .then(function(res) { return res.json(); })
            .then(function(pkg) {
                document.title = pkg.name;
                document.getElementById("content").innerHTML =
                    '<div class="detail-container">' +
                    '<img src="' + pkg.image + '" alt="' + pkg.name + '">' +
                    '<div class="detail-info">' +
                    '<h2>' + pkg.name + '</h2>' +
                    '<div class="detail-price">₹' + pkg.price.toLocaleString("en-IN") + '</div>' +
                    '<div class="detail-guests">👥 Guests: ' + pkg.guests + '</div>' +
                    '<p>' + pkg.description + '</p>' +
                    '</div></div>';
            })
            .catch(function() {
                document.getElementById("content").innerHTML = "<p style='text-align:center;padding:40px'>Failed to load package details.</p>";
            });
    }
</script>

</body>
</html>
